services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library
      DIRECT_URL: postgresql://postgres:postgres@db:5432/library
      JWT_SECRET: local-compose-secret-32-characters
      JWT_EXPIRES_IN: 2h
      OVERDUE_NOTIFICATION_INTERVAL_MS: 60000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:deploy && npm start"
    restart: unless-stopped
    networks:
      - library-network

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - library-network

volumes:
  postgres_data:

networks:
  library-network:
    driver: bridge
