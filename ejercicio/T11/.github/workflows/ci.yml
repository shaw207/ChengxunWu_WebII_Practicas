name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: library_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d library_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/library_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/library_test
      JWT_SECRET: github-actions-secret-32-characters
      JWT_EXPIRES_IN: 2h
      OVERDUE_NOTIFICATION_INTERVAL_MS: 60000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Deploy database migrations
        run: npm run db:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Run tests
        run: npm run test:ci
